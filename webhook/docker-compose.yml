services:
  neon-webhook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neon-webhook
    network_mode: "host"
    restart: unless-stopped
    user: "1001:1001"
    volumes:
      - ./logs:/app/logs
      # Monta o CLI do OpenClaw do host pra rotear mensagens pros agentes
      - /home/ubuntu/.npm-global:/home/ubuntu/.npm-global:ro
      - /home/ubuntu/.openclaw:/home/ubuntu/.openclaw
    environment:
      - NODE_ENV=production
      - WEBHOOK_PORT=3344
      - WEBHOOK_HOST=0.0.0.0
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/home/ubuntu/.npm-global/bin
      - HOME=/home/ubuntu
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
